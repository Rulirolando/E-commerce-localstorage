name: Frontend & Worker CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    env:
      # Database & Auth
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: true

      # Email Service
      EMAIL_SERVER_USER: ${{ secrets.EMAIL_SERVER_USER }}
      EMAIL_SERVER_PASSWORD: ${{ secrets.EMAIL_SERVER_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

      # Midtrans
      MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}
      MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
      NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
      NEXT_PUBLIC_MIDTRANS_APP_URL: ${{ secrets.NEXT_PUBLIC_MIDTRANS_APP_URL }}

      # Others
      NGROK_AUTH: ${{ secrets.NGROK_AUTH }}

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: 3. Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: 4. Generate Prisma Client
        working-directory: ./frontend
        run: npx prisma generate

      - name: 5. Linting Check
        working-directory: ./frontend
        run: npm run lint

      - name: 6. Build Next.js
        working-directory: ./frontend
        run: npm run build

      - name: 7. Check Notification Worker
        working-directory: ./frontend
        run: npx tsc worker/notif-worker.js
