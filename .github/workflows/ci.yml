name: Frontend & Worker CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    env:
      # Database & Auth
      DATABASE_URL:  `${process.env.DATABASE_URL}`
      AUTH_SECRET: `${process.env.NEXTAUTH_SECRET}`
      NEXTAUTH_SECRET: `${process.env.NEXTAUTH_SECRET}`
      AUTH_GOOGLE_ID: `${process.env.AUTH_GOOGLE_ID}`
      AUTH_GOOGLE_SECRET: `${process.env.AUTH_GOOGLE_SECRET}`
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: true

      # Email Service
      EMAIL_SERVER_USER: `${process.env.EMAIL_SERVER_USER}`
      EMAIL_SERVER_PASSWORD: `${process.env.EMAIL_SERVER_PASSWORD}`
      EMAIL_FROM: `${process.env.EMAIL_FROM}`

      # Midtrans
      MIDTRANS_SERVER_KEY: `${process.env.MIDTRANS_SERVER_KEY}`
      MIDTRANS_CLIENT_KEY: `${process.env.MIDTRANS_CLIENT_KEY}`
      NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: `${process.env.NEXT_PUBLIC_MIDTRANS_CLIENT_KEY}`
      NEXT_PUBLIC_MIDTRANS_APP_URL: `${process.env.NEXT_PUBLIC_MIDTRANS_APP_URL}`

      # Others
      NGROK_AUTH: ${{ secrets.NGROK_AUTH }}

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 3. Install dependencies

        run: npm install

      - name: 4. Generate Prisma Client

        run: npx prisma generate

      - name: 5. Linting Check

        run: npm run lint

      - name: 6. Build Next.js

        run: npm run build

      - name: 7. Check Notification Worker

        run: npx tsc worker/notif-worker.js
